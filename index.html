<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Local Craft - Handcrafted goods and artisan products. Coming Soon!">
    <title>The Local Crafts - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f57224 0%, #ff933f 50%, #d3232a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #212121;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: -250px;
            right: -250px;
            animation: pulse 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            animation: pulse 20s ease-in-out infinite reverse;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3),
                         0 0 20px rgba(255, 255, 255, 0.2);
            animation: fadeInDown 1s ease-out;
            background: linear-gradient(135deg, #ffffff 0%, #fff5e6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ffffff;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            animation: fadeInDown 1s ease-out 0.2s backwards;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .content-box {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.15) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 3rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37),
                        inset 0 1px 1px rgba(255, 255, 255, 0.4);
            animation: fadeInUp 1s ease-out 0.4s backwards;
            position: relative;
            overflow: hidden;
        }

        .content-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        .coming-soon {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c25500 0%, #d96a00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .description {
            font-size: 1.1rem;
            color: #ffffff;
            line-height: 1.8;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .craft-icon {
            font-size: 4rem;
            margin: 1.5rem 0;
            animation: float 3s ease-in-out infinite;
        }

        .notify-form {
            display: flex;
            gap: 1rem;
            max-width: 500px;
            margin: 2rem auto;
            flex-wrap: wrap;
            justify-content: center;
        }

        .notify-input {
            flex: 1;
            min-width: 250px;
            padding: 1rem 1.5rem;
            border: 2px solid #e2e2e2;
            border-radius: 50px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .notify-input::placeholder {
            color: #666666;
            opacity: 1;
        }

        .notify-input:focus {
            outline: none;
            border-color: #c25500;
        }

        .notify-button {
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #f57224 0%, #ff933f 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .notify-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(194, 85, 0, 0.4);
            background: linear-gradient(135deg, #c25500 0%, #e07000 100%);
        }

        .social-links {
            margin-top: 2rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .social-link {
            width: 50px;
            height: 50px;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #333333;
            font-size: 1.5rem;
            transition: background 0.3s, transform 0.3s;
        }

        .social-link:hover {
            background: #c25500;
            color: white;
            transform: scale(1.1);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .contact-info {
            margin-top: 2rem;
            padding: 1.25rem 1.5rem;
            background: linear-gradient(135deg, rgba(194, 85, 0, 0.08) 0%, rgba(255, 147, 63, 0.08) 100%);
            border-radius: 12px;
            color: #3d3d3d;
            font-size: 0.95rem;
        }

        .contact-email {
            color: #9a3d00;
            text-decoration: none;
            font-weight: 600;
            padding: 0.15rem 0.4rem;
            background: rgba(194, 85, 0, 0.12);
            border-radius: 4px;
            transition: all 0.3s;
        }

        .contact-email:hover {
            color: #fff;
            background: #c25500;
        }

        /* Focus states for keyboard accessibility */
        .notify-input:focus-visible {
            outline: 3px solid #c25500;
            outline-offset: 2px;
        }

        .notify-button:focus-visible {
            outline: 3px solid #fff;
            outline-offset: 2px;
        }

        .social-link:focus-visible {
            outline: 3px solid #c25500;
            outline-offset: 2px;
        }

        .contact-email:focus-visible {
            outline: 2px solid #c25500;
            outline-offset: 2px;
            border-radius: 2px;
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 2rem;
            }

            .coming-soon {
                font-size: 2rem;
            }

            .content-box {
                padding: 2rem 1.5rem;
            }

            .notify-form {
                flex-direction: column;
            }

            .notify-input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">The Local Crafts</div>
        <div class="subtitle">HANDCRAFTED WITH LOVE</div>

        <div class="content-box">
            <div class="craft-icon">✨🎨🧶</div>
            <h1 class="coming-soon">Coming Soon</h1>
            <p class="description">
                We're crafting something special for you! Our collection of handmade,
                artisan products will be available soon. From unique home decor to
                one-of-a-kind gifts, every piece tells a story.
            </p>

            <form class="notify-form" onsubmit="handleSubmit(event)">
                <input
                    type="email"
                    class="notify-input"
                    placeholder="Enter your email"
                    required
                    id="emailInput"
                >
                <button type="submit" class="notify-button">Notify Me</button>
            </form>


            <div class="contact-info">
                Questions? Reach us at <a href="mailto:hello@thelocalcrafts.com" class="contact-email">hello@thelocalcrafts.com</a>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const email = document.getElementById('emailInput').value;
            alert('Thank you! We\'ll notify you at ' + email + ' when we launch!');
            document.getElementById('emailInput').value = '';
        }
    </script>
</body>
</html>
